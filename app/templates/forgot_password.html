<!DOCTYPE html>
<html>
<head>
    <title>Forgot Password | InsightX</title>
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='images/insightx-favicon.png') }}?v=20260425">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <style>
        body {
            min-height: 100vh;
            margin: 0;
            background:
                radial-gradient(circle at top left, rgba(14, 165, 233, 0.22), transparent 28%),
                radial-gradient(circle at bottom right, rgba(249, 115, 22, 0.22), transparent 30%),
                linear-gradient(135deg, #f8fafc 0%, #eef2ff 45%, #fff7ed 100%);
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        }

        .forgot-wrap {
            min-height: 100vh;
        }

        .forgot-card {
            border: 0;
            border-radius: 22px;
            box-shadow: 0 24px 56px rgba(15, 23, 42, 0.16);
            background: rgba(255, 255, 255, 0.97);
        }

        .forgot-card .card-body {
            padding: 30px;
        }

        .field-label {
            color: #334155;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .mail-logo {
            display: block;
            width: 100%;
            max-width: 460px;
            margin: 0 auto 14px;
            height: auto;
            border-radius: 10px;
        }

        .field-input {
            border-radius: 12px;
            border: 1px solid #cbd5e1;
            padding: 12px 14px;
        }

        .field-input:focus {
            border-color: #0ea5e9;
            box-shadow: 0 0 0 0.2rem rgba(14, 165, 233, 0.16);
        }

        .action-btn {
            border-radius: 12px;
            border: 0;
            padding: 11px 16px;
            font-weight: 600;
            background: linear-gradient(135deg, #0f172a 0%, #0ea5e9 100%);
        }
    </style>
</head>
<body>
    <div class="container forgot-wrap d-flex align-items-center justify-content-center py-5">
        <div class="col-md-7 col-lg-5">
            <div class="card forgot-card">
                <div class="card-body">
                    <img src="{{ url_for('static', filename='images/insightx-logo.png') }}?v=20260425" alt="InsightX" class="mail-logo">
                    <h3 class="mb-2">Forgot Password</h3>
                    <p class="text-muted mb-4">Enter your account email. We will send a temporary password to your inbox.</p>

                    {% with messages = get_flashed_messages(with_categories=true) %}
                    {% if messages %}
                      {% for category, message in messages %}
                        <div class="alert alert-{{ category }} py-2">{{ message }}</div>
                      {% endfor %}
                    {% endif %}
                    {% endwith %}

                    <form method="POST">
                        <div class="mb-3">
                            <label class="field-label">Email</label>
                            <input class="form-control field-input" type="email" name="email" placeholder="Enter your email" required>
                        </div>
                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-primary action-btn">Send Temporary Password</button>
                            <a href="{{ url_for('main.login') }}" class="btn btn-outline-secondary">Back to Login</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
